name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ vars.PUBLIC_APP_MODE == 'standalone' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
        env:
          BASE_PATH: ${{ vars.BASE_PATH || format('/{0}', github.event.repository.name) }}
          PUBLIC_APP_MODE: ${{ vars.PUBLIC_APP_MODE }}
          PUBLIC_SEED_URLS: ${{ vars.PUBLIC_SEED_URLS }}
          PUBLIC_APP_NAME: ${{ vars.PUBLIC_APP_NAME }}
          PUBLIC_APP_SHORT_NAME: ${{ vars.PUBLIC_APP_SHORT_NAME }}
          PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
          PUBLIC_APP_DESCRIPTION: ${{ vars.PUBLIC_APP_DESCRIPTION }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    if: ${{ vars.PUBLIC_APP_MODE == 'standalone' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
